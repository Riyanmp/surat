<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Surat - ITBAN IV Inspektorat NTB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <img class="brand-logo" src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhI8_WyUqz2uBbR1c1Z9GvvKGjk-4oy5D7O-5pnY-LKlFvTed_bsC4yH-Zhym50qrjRKtH6RNML9JBJMHylXeUqlFYAQfFCSO5xS4XdLz-IxEv5CUYLMIyzHjoZJ2BeZTpo7o0coKYaOz95fKeFxfKBvo8KaKCMrZdd34VB98y_iYZ1f5JYKFfzPA/s1043/Provinsi%20NTB.png" alt="Logo NTB">
            <div>
                <span class="brand-text">RUANGAN ITBAN IV</span>
                <span class="brand-sub">Inspektorat Provinsi NTB</span>
            </div>
        </div>
        <nav class="sidebar-menu">
            <div class="sidebar-section">Akun</div>
            <a href="profil.html" class="menu-item">
                <span class="menu-icon">&#9787;</span> Profil
            </a>
            <div class="sidebar-section">Menu Utama</div>
            <a href="index.html" class="menu-item">
                <span class="menu-icon">&#9654;</span> Beranda
            </a>
            <a href="input.html" class="menu-item active">
                <span class="menu-icon">&#43;</span> Input Surat
            </a>
            <a href="data.html" class="menu-item">
                <span class="menu-icon">&#9776;</span> Data Surat
            </a>
            <a href="laporan.html" class="menu-item">
                <span class="menu-icon">&#9733;</span> Laporan
            </a>
            <div class="sidebar-section">Lainnya</div>
            <a href="tracking.html" class="menu-item">
                <span class="menu-icon">&#9656;</span> Tracking
            </a>
            <a href="panduan.html" class="menu-item">
                <span class="menu-icon">&#9873;</span> Panduan
            </a>
        </nav>
        <div class="sidebar-footer">Pemprov NTB &copy; 2026</div>
    </aside>

    <div class="sidebar-overlay" onclick="document.getElementById('sidebar').classList.remove('show')"></div>

    <div class="main">
        <header class="header">
            <button class="btn-menu" onclick="document.getElementById('sidebar').classList.toggle('show')">&#9776;</button>
            <h2 class="header-title">Input Surat Masuk</h2>
            <a href="data.html" class="header-btn" id="btnLihatData">Lihat Data &rarr;</a>
            <span class="header-user" id="headerUser"></span>
            <button class="btn btn-gray btn-sm" onclick="logout()">Keluar</button>
        </header>

        <div class="body">
            <div class="card anim-form">
                <div class="card-body">
                    <form id="suratForm">

                        <div class="form-section">
                            <div class="form-title">Informasi Surat</div>
                            <div class="form-row cols-3">
                                <div class="field">
                                    <label>Sumber Surat <span class="req">*</span></label>
                                    <input type="text" id="sumberSurat" placeholder="Dispora, Dinas Kesehatan" required>
                                </div>
                                <div class="field">
                                    <label>Nomor Surat <span class="req">*</span></label>
                                    <input type="text" id="nomorSurat" placeholder="001/SET/2026" required>
                                </div>
                                <div class="field">
                                    <label>Perihal <span class="req">*</span></label>
                                    <input type="text" id="perihal" placeholder="Perihal / maksud surat" required>
                                </div>
                            </div>
                            <div class="form-row cols-3">
                                <div class="field">
                                    <label>Tanggal Surat <span class="req">*</span></label>
                                    <input type="date" id="tanggalSurat" required>
                                </div>
                                <div class="field">
                                    <label>Tanggal Masuk <span class="req">*</span></label>
                                    <input type="date" id="tanggalMasuk" required>
                                </div>
                                <div class="field">
                                    <label>File Surat</label>
                                    <input type="file" id="fileSurat" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png">
                                    <small class="field-hint">PDF, Word, Gambar (maks 2MB)</small>
                                </div>
                            </div>
                            <div class="form-row cols-3">
                                <div class="field">
                                    <label>Tgl Diterima ITBAN</label>
                                    <input type="date" id="tanggalTerimaITBAN">
                                </div>
                                <div class="field">
                                    <label>Tgl Diterima DANIS</label>
                                    <input type="date" id="tanggalTerimaDANIS">
                                </div>
                                <div class="field"></div>
                            </div>
                        </div>

                        <div class="form-section">
                            <div class="form-title">Isi Disposisi</div>
                            <div class="field">
                                <textarea id="isiDisposisi" rows="3" placeholder="Tuliskan isi disposisi surat..."></textarea>
                            </div>
                        </div>

                        <div class="form-section">
                            <div class="form-title">Tindak Lanjut</div>
                            <div class="form-row cols-2">
                                <div class="field">
                                    <label>Tindak Lanjut</label>
                                    <input type="text" id="tindakLanjut" placeholder="Tindak lanjut yang dilakukan">
                                </div>
                                <div class="field">
                                    <label>Kendala</label>
                                    <input type="text" id="kendala" placeholder="Kendala (jika ada)">
                                </div>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-green" id="btnSimpan">Simpan</button>
                            <button type="button" class="btn btn-orange" id="btnBatal" style="display:none">Batal Edit</button>
                            <button type="button" class="btn btn-gray" id="btnReset">Reset</button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <script src="script.js"></script>
    <script>
        if (!isLoggedIn()) { window.location.href = 'login.html'; }
        document.getElementById('headerUser').textContent = getUserLabel();
        if (!isAdmin()) {
            document.getElementById('btnLihatData').style.display = 'none';
        }
        initInputPage();
        initSidebar();
    </script>

</body>
</html>
