<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - ITBAN IV Inspektorat NTB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <img class="brand-logo" src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhI8_WyUqz2uBbR1c1Z9GvvKGjk-4oy5D7O-5pnY-LKlFvTed_bsC4yH-Zhym50qrjRKtH6RNML9JBJMHylXeUqlFYAQfFCSO5xS4XdLz-IxEv5CUYLMIyzHjoZJ2BeZTpo7o0coKYaOz95fKeFxfKBvo8KaKCMrZdd34VB98y_iYZ1f5JYKFfzPA/s1043/Provinsi%20NTB.png" alt="Logo NTB">
            <div>
                <span class="brand-text">RUANGAN ITBAN IV</span>
                <span class="brand-sub">Inspektorat Provinsi NTB</span>
            </div>
        </div>
        <nav class="sidebar-menu">
            <div class="sidebar-section">Akun</div>
            <a href="profil.html" class="menu-item active">
                <span class="menu-icon">&#9787;</span> Profil
            </a>
            <div class="sidebar-section">Menu Utama</div>
            <a href="index.html" class="menu-item">
                <span class="menu-icon">&#9654;</span> Beranda
            </a>
            <a href="input.html" class="menu-item" id="menuInput">
                <span class="menu-icon">&#43;</span> Input Surat
            </a>
            <a href="data.html" class="menu-item">
                <span class="menu-icon">&#9776;</span> Data Surat
            </a>
            <a href="laporan.html" class="menu-item">
                <span class="menu-icon">&#9733;</span> Laporan
            </a>
            <div class="sidebar-section">Lainnya</div>
            <a href="tracking.html" class="menu-item">
                <span class="menu-icon">&#9656;</span> Tracking
            </a>
            <a href="panduan.html" class="menu-item">
                <span class="menu-icon">&#9873;</span> Panduan
            </a>
        </nav>
        <div class="sidebar-footer">Pemprov NTB &copy; 2026</div>
    </aside>

    <div class="sidebar-overlay" onclick="document.getElementById('sidebar').classList.remove('show')"></div>

    <div class="main">
        <header class="header">
            <button class="btn-menu" onclick="document.getElementById('sidebar').classList.toggle('show')">&#9776;</button>
            <h2 class="header-title">Profil Pengguna</h2>
            <span class="header-user" id="headerUser"></span>
            <button class="btn btn-gray btn-sm" onclick="logout()">Keluar</button>
        </header>

        <div class="body">
            <div class="row-2">
                <div class="card anim-card">
                    <div class="card-head">
                        <span>Informasi Akun</span>
                    </div>
                    <div class="card-body">
                        <div class="profile-info">
                            <div class="profile-avatar" id="profileAvatar"></div>
                            <div class="profile-detail">
                                <div class="profile-name" id="profileName"></div>
                                <span class="badge badge-blue" id="profileRole"></span>
                            </div>
                        </div>

                        <div class="profile-rows">
                            <div class="profile-row">
                                <span class="profile-key">Username</span>
                                <span class="profile-val" id="profileUser"></span>
                            </div>
                            <div class="profile-row">
                                <span class="profile-key">Role</span>
                                <span class="profile-val" id="profileRoleText"></span>
                            </div>
                            <div class="profile-row">
                                <span class="profile-key">Total Surat</span>
                                <span class="profile-val" id="profileTotal"></span>
                            </div>
                            <div class="profile-row">
                                <span class="profile-key">Terakhir Login</span>
                                <span class="profile-val" id="profileLastLogin"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card anim-card">
                    <div class="card-head">
                        <span>Ganti Password</span>
                    </div>
                    <div class="card-body">
                        <form id="passForm">
                            <div class="field">
                                <label>Password Lama <span class="req">*</span></label>
                                <input type="password" id="passLama" placeholder="Masukkan password lama" required>
                            </div>
                            <div class="field">
                                <label>Password Baru <span class="req">*</span></label>
                                <input type="password" id="passBaru" placeholder="Masukkan password baru" required>
                            </div>
                            <div class="field">
                                <label>Konfirmasi Password <span class="req">*</span></label>
                                <input type="password" id="passKonf" placeholder="Ulangi password baru" required>
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="btn btn-blue">Simpan Password</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <script src="script.js"></script>
    <script>
        if (!isLoggedIn()) { window.location.href = 'login.html'; }
        document.getElementById('headerUser').textContent = getUserLabel();
        if (!isAdmin()) {
            document.getElementById('menuInput').style.display = 'none';
        }
        loadProfil();
        initSidebar();
    </script>

</body>
</html>
