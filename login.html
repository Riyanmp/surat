<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ITBAN IV Inspektorat NTB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

    <div class="login-box">
        <div class="login-header">
            <img class="login-logo" src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhI8_WyUqz2uBbR1c1Z9GvvKGjk-4oy5D7O-5pnY-LKlFvTed_bsC4yH-Zhym50qrjRKtH6RNML9JBJMHylXeUqlFYAQfFCSO5xS4XdLz-IxEv5CUYLMIyzHjoZJ2BeZTpo7o0coKYaOz95fKeFxfKBvo8KaKCMrZdd34VB98y_iYZ1f5JYKFfzPA/s1043/Provinsi%20NTB.png" alt="Logo NTB">
            <h2>RUANGAN ITBAN IV</h2>
            <p>Inspektorat Provinsi Nusa Tenggara Barat</p>
        </div>

        <form id="loginForm">
            <div class="field">
                <label>Username</label>
                <input type="text" id="loginUser" placeholder="Masukkan username" required>
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" id="loginPass" placeholder="Masukkan password" required>
            </div>
            <div class="login-err" id="loginErr"></div>
            <button type="submit" class="btn btn-green btn-full">Masuk</button>
        </form>
    </div>

    <script>
        if (localStorage.getItem('loggedIn')) {
            window.location.href = 'index.html';
        }

        var defaultUsers = {
            admin: { password: 'admin123', role: 'admin' },
            user: { password: 'user123', role: 'user' }
        };

        var storedUsers = localStorage.getItem('usersData');
        var users = storedUsers ? JSON.parse(storedUsers) : defaultUsers;
        if (!storedUsers) localStorage.setItem('usersData', JSON.stringify(defaultUsers));

        var loginBox = document.querySelector('.login-box');

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var u = document.getElementById('loginUser').value.trim();
            var p = document.getElementById('loginPass').value;
            var err = document.getElementById('loginErr');

            if (users[u] && users[u].password === p) {
                localStorage.setItem('loggedIn', '1');
                localStorage.setItem('username', u);
                localStorage.setItem('role', users[u].role);
                localStorage.setItem('lastLogin', new Date().toISOString());
                loginBox.style.animation = 'none';
                loginBox.style.transition = 'all .3s ease';
                loginBox.style.opacity = '0';
                loginBox.style.transform = 'scale(0.95)';
                setTimeout(function() {
                    window.location.href = 'index.html';
                }, 300);
            } else {
                err.textContent = 'Username atau password salah';
                err.style.animation = 'none';
                err.offsetHeight;
                loginBox.style.animation = 'shake .4s ease';
                setTimeout(function() {
                    loginBox.style.animation = 'fadeInUp .6s cubic-bezier(.4,0,.2,1)';
                }, 500);
            }
        });

        document.querySelectorAll('.login-box input').forEach(function(input, i) {
            input.addEventListener('focus', function() {
                this.style.transform = 'translateY(-1px)';
                this.style.transition = 'all .2s ease';
            });
            input.addEventListener('blur', function() {
                this.style.transform = 'translateY(0)';
            });
        });
    </script>

</body>
</html>
